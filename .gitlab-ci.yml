# CAN FD IP 验证环境 — GitLab CI 配置
# 用法: 推送代码后自动触发, 也可手动触发特定 group

stages:
  - lint
  - regression
  - coverage
  - report

variables:
  VERIFY_HOME: $CI_PROJECT_DIR
  VCS_HOME: /tools/synopsys/vcs/vcs-mx-2023.12
  VERDI_HOME: /tools/synopsys/verdi/verdi-2023.12
  LM_LICENSE_FILE: "27000@license-server"

default:
  tags:
    - vcs-runner
  timeout: 4h

# ---------------------------------------------------------------------------
# Lint 检查 (快速反馈)
# ---------------------------------------------------------------------------
lint:
  stage: lint
  script:
    - echo "Running SystemVerilog lint..."
    - cd run && python3 regression.py --list
  timeout: 10m

# ---------------------------------------------------------------------------
# 回归测试 — 各 group 并行运行
# ---------------------------------------------------------------------------
.regression_template: &regression_def
  stage: regression
  script:
    - cd run
    - python3 regression.py --run $GROUP --cov --parallel 4 -n $REPEAT
  artifacts:
    when: always
    paths:
      - results/
      - build/*/sim/*/sim.log
    expire_in: 30 days

regression:T1:
  <<: *regression_def
  variables:
    GROUP: T1
    REPEAT: 1

regression:T2:
  <<: *regression_def
  variables:
    GROUP: T2
    REPEAT: 1

regression:T3:
  <<: *regression_def
  variables:
    GROUP: T3
    REPEAT: 1

regression:T4:
  <<: *regression_def
  variables:
    GROUP: T4
    REPEAT: 1

regression:T5:
  <<: *regression_def
  variables:
    GROUP: T5
    REPEAT: 3  # 错误注入组多跑几次

regression:T6:
  <<: *regression_def
  variables:
    GROUP: T6
    REPEAT: 1

regression:T7:
  <<: *regression_def
  variables:
    GROUP: T7
    REPEAT: 3  # 压力/边界组多跑几次

# ---------------------------------------------------------------------------
# Nightly 全量回归 (手动触发或定时)
# ---------------------------------------------------------------------------
nightly-full:
  stage: regression
  script:
    - cd run
    - python3 regression.py --run all --cov --parallel 8 -n 5
  artifacts:
    when: always
    paths:
      - results/
    expire_in: 90 days
  only:
    - schedules
    - triggers
  timeout: 12h

# ---------------------------------------------------------------------------
# 覆盖率合并与报告
# ---------------------------------------------------------------------------
coverage-merge:
  stage: coverage
  script:
    - cd run
    - python3 regression.py --covmerge
    - python3 regression.py --report
  artifacts:
    paths:
      - results/regression_report.json
      - coverage/coverage_result/*.vdb
    expire_in: 90 days
  needs:
    - job: regression:T1
      optional: true
    - job: regression:T2
      optional: true
    - job: regression:T3
      optional: true
    - job: regression:T4
      optional: true
    - job: regression:T5
      optional: true
    - job: regression:T6
      optional: true
    - job: regression:T7
      optional: true

# ---------------------------------------------------------------------------
# 生成回归仪表板
# ---------------------------------------------------------------------------
dashboard:
  stage: report
  script:
    - cd run
    - python3 gen_dashboard.py
  artifacts:
    paths:
      - results/dashboard.html
    expire_in: 30 days
  needs:
    - coverage-merge
